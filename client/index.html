<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Attende-x" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Smart video attendance platform for teachers and students" />

    <title>Attende-X</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./public/manifest.json" />

    <!-- Apple Touch Icons (required for iOS home screen icon) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />

    <!-- iOS splash screens (optional but improves install experience) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Preconnect to API servers for faster first request -->
    <link rel="preconnect" href="https://auth.attendex.com" />
    <link rel="preconnect" href="https://api.attendex.com" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: '/' })
            .then(function (reg) {
              console.log('[SW] Registered, scope:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
