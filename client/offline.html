<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attende-x — You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p  { font-size: 16px; color: #94a3b8; max-width: 320px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .sub { font-size: 13px; color: #475569; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Attende-x needs an internet connection to work. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <p class="sub">If you were in a meeting, reconnect to rejoin</p>
</body>
</html>
